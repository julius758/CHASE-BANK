<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Finance Dashboard</title>
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --text-main: #f0f6fc;
            --text-alt: #8b949e;
            --neon-green: #3fb950;
            --border: #30363d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        /* Balance Section */
        .balance-card {
            background-color: var(--neon-green);
            color: #000;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(63, 185, 80, 0.4);
        }

        .card-label { font-size: 14px; font-weight: 500; opacity: 0.8; }
        .balance-amount { font-size: 38px; font-weight: 700; margin-top: 5px; }

        /* Actions Section */
        .actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .action-btn {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
        }

        /* Transactions Section */
        .transaction-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--border);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-title { font-size: 18px; font-weight: 600; margin: 0; }
        .view-all { color: var(--neon-green); font-size: 13px; text-decoration: none; font-weight: 500; }

        .transaction-list { display: flex; flex-direction: column; gap: 15px; }

        .txn-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .txn-details { display: flex; align-items: center; gap: 12px; }
        
        /* Specific Transaction Highlights */
        .highlight-green {
            background-color: rgba(63, 185, 80, 0.15);
            color: var(--neon-green);
            padding: 8px;
            border-radius: 50%;
            font-size: 18px;
        }

        .txn-title { font-weight: 600; font-size: 14px; }
        .txn-meta { color: var(--text-alt); font-size: 12px; margin-top: 2px; }

        .txn-amount { text-align: right; }
        .amount { font-weight: 700; font-size: 16px; }
        .amount-received { color: var(--neon-green); }
        .txn-type { font-size: 11px; color: var(--text-alt); text-transform: uppercase; margin-top: 2px; }

    </style>
</head>
<body>

    <div class="balance-card">
        <div class="card-label">Available Balance</div>
        <div class="balance-amount">$750,000.00</div>
    </div>

    <div class="actions">
        <div class="action-btn">Deposit</div>
        <div class="action-btn">Withdraw</div>
    </div>

    <div class="transaction-card">
        <div class="section-header">
            <h2 class="section-title">Transactions</h2>
            <a href="#" class="view-all">View All</a>
        </div>

        <div class="transaction-list">
            
            <div class="txn-item">
                <div class="txn-details">
                    <div class="highlight-green">↓</div>
                    <div>
                        <div class="txn-title">Secure Incoming Transfer</div>
                        <div class="txn-meta">29 April 2021</div>
                    </div>
                </div>
                <div class="txn-amount">
                    <div class="amount amount-received">+$750,000.00</div>
                    <div class="txn-type">Received</div>
                </div>
            </div>

            <div class="txn-item">
                <div class="txn-details">
                    <div style="color: var(--text-alt); font-size: 18px;">•</div>
                    <div>
                        <div class="txn-title">Monthly Subscription</div>
                        <div class="txn-meta">15 March 2026, 10:30 AM</div>
                    </div>
                </div>
                <div class="txn-amount">
                    <div class="amount">-$14.99</div>
                    <div class="txn-type">Spent</div>
                </div>
            </div>

            <div class="txn-item" style="border-bottom: none;">
                <div class="txn-details">
                    <div style="color: var(--text-alt); font-size: 18px;">•</div>
                    <div>
                        <div class="txn-title">Gas Station</div>
                        <div class="txn-meta">14 March 2026, 4:15 PM</div>
                    </div>
                </div>
                <div class="txn-amount">
                    <div class="amount">-$85.00</div>
                    <div class="txn-type">Spent</div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
